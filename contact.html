<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us | BLF Transportation</title>
  <meta name="description" content="Contact BLF Transportation Logistics Corp. Call +1(502) 957-0339 or email info@blftransportation.com. Available 24/7, 365 days a year.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700;1,800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="contact">
  <div id="site-header"></div>

  <section class="section">
    <div class="container" style="max-width:720px">
      <div class="form-card">
        <h2>Contact Us</h2>
        <form data-blf-form>
          <div class="field"><label>First Name <span class="req">*</span></label><input type="text" name="first_name" placeholder="First Name" required></div>
          <div class="field"><label>Last Name <span class="req">*</span></label><input type="text" name="last_name" placeholder="Last Name" required></div>
          <div class="field"><label>Phone <span class="req">*</span></label><input type="tel" name="phone" placeholder="Phone" required></div>
          <div class="field"><label>Email <span class="req">*</span></label><input type="email" name="email" placeholder="Email" required></div>
          <div class="field"><label>Comments</label><textarea name="comments" placeholder="Type your comments here..."></textarea></div>
          <label class="consent"><input type="checkbox" required> I agree to the <a href="privacy-policy.html">Privacy Policy</a>. By providing my phone number, I consent to receive text messages from BLF Transportation and its trusted partners.</label>
          <button type="submit" class="btn btn--primary btn--block">Send</button>
        </form>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="js/site.js"></script>
</body>
</html>
