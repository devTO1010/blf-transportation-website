<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrier Contractor | Work With Us | BLF Transportation</title>
  <meta name="description" content="Partner with BLF Transportation as a Carrier Contractor. Get a quote — it takes less than 10 minutes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;0,800;1,700;1,800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="jobs">
  <div id="site-header"></div>

  <section class="hero hero--sm" style="background-image:url('https://images.leadconnectorhq.com/image/f_webp/q_80/r_1200/u_https://assets.cdn.filesafe.space/akLPiKr1YIqw6x20rRi6/media/626ad5af8528ac3718a0c915.jpeg')">
    <div class="container"><div class="hero__inner">
      <span class="hero__eyebrow">Work With Us</span>
      <h1 class="hero__title">We Are Hiring</h1>
    </div></div>
  </section>

  <section class="section">
    <div class="container">
      <h2 style="font-size:clamp(28px,3.5vw,40px);font-weight:700;margin-bottom:8px">Carrier Contractor</h2>
      <p style="max-width:640px;margin-bottom:36px">Get a quote in under 10 minutes. Send us your company details and we'll set you up to start hauling with BLF.</p>
      <div class="form-card" style="max-width:640px">
        <form data-blf-form>
          <div class="field"><label>Company Name <span class="req">*</span></label><input type="text" name="company" placeholder="Company Name" required></div>
          <div class="field"><label>Full Name <span class="req">*</span></label><input type="text" name="full_name" placeholder="Full Name" required></div>
          <div class="field"><label>Phone <span class="req">*</span></label><input type="tel" name="phone" placeholder="Phone" required></div>
          <div class="field"><label>Email <span class="req">*</span></label><input type="email" name="email" placeholder="Email" required></div>
          <div class="field"><label>Type of Freight <span class="req">*</span></label><input type="text" name="freight_type" placeholder="Type of Freight" required></div>
          <div class="field"><label>Quote Details</label><textarea name="quote_details" placeholder="Quote Details"></textarea></div>
          <label class="consent"><input type="checkbox" required> I agree to the <a href="privacy-policy.html">Privacy Policy</a>. By providing my phone number, I consent to receive text messages from BLF Transportation and its trusted partners.</label>
          <button type="submit" class="btn btn--primary btn--block">Send</button>
        </form>
      </div>
    </div>
  </section>

  <div id="site-footer"></div>
  <script src="js/site.js"></script>
</body>
</html>
