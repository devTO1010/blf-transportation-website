<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | BLF Transportation</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --teal:#27B9B3; --charcoal:#212529; --body:#607179; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Poppins", Arial, sans-serif;
      color: var(--charcoal);
      background: #fff;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 40px 24px; min-height: 100vh;
    }
    .code { font-size: clamp(80px, 18vw, 160px); font-weight: 800; line-height: 1; color: var(--teal); }
    h1 { font-size: clamp(24px, 4vw, 34px); font-weight: 700; margin: 8px 0 12px; text-transform: uppercase; }
    p { color: var(--body); max-width: 460px; margin: 0 0 28px; font-size: 16px; line-height: 1.6; }
    a.btn {
      display: inline-block; background: var(--charcoal); color: #fff; text-decoration: none;
      text-transform: uppercase; letter-spacing: .5px; font-weight: 500; font-size: 14px;
      padding: 14px 32px; border-radius: 3px; transition: background .2s;
    }
    a.btn:hover { background: var(--teal); }
    .contact { margin-top: 26px; font-size: 14px; color: var(--body); }
    .contact a { color: var(--teal); text-decoration: none; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The road ends here &mdash; this page doesn't exist or has moved. Let's get you back on route.</p>
  <a class="btn" href="/">Back to Home</a>
  <div class="contact">
    Need a hand? Call <a href="tel:+15029570339">+1(502) 957-0339</a> or email <a href="mailto:info@blftransportation.com">info@blftransportation.com</a>
  </div>
</body>
</html>
